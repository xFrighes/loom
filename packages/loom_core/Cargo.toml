[package]
name = "loom_core"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
napi = { version = "2.12", features = ["async", "serde-json"] }
napi-derive = "2.12"
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
sha2 = "0.10"
walkdir = "2.5"
ignore = "0.4"
rayon = "1.10"
hex = "0.4"
chrono = "0.4"
uuid = { version = "1.0", features = ["v4", "serde"] }
regex = "1.10"

[build-dependencies]
napi-build = "2.0"
